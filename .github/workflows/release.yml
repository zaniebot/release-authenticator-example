name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, without the leading v
        required: true
        type: string

permissions: {}

jobs:
  release-gate:
    name: release-gate
    runs-on: ubuntu-latest
    environment:
      name: release-gate
      deployment: false
    steps:
      - run: echo "Release approved"

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - release-gate
    environment: release

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes
